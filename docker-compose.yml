

services:
  backend:
    build: ./backend
    image: pulsenet_backend  # ✅ build once, reuse
    container_name: django_backend
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8000 backend.asgi:application
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - GDAL_LIBRARY_PATH=/usr/lib/libgdal.so
      - GEOS_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/libgeos_c.so
      - HF_HOME=/app/model_cache
      - SENTENCE_TRANSFORMERS_HOME=/app/model_cache
    volumes:
      - ./backend:/app
      - model_data:/app/model_cache
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    image: pulsenet_backend  # ✅ reuse image
    container_name: celery_worker
    restart: unless-stopped
    command: celery -A backend worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - HF_HOME=/app/model_cache
      - SENTENCE_TRANSFORMERS_HOME=/app/model_cache
    volumes:
      - ./backend:/app
      - model_data:/app/model_cache
    depends_on:
      - redis
      - db

  celery_beat:
    image: pulsenet_backend  # ✅ reuse image
    container_name: celery_beat
    restart: unless-stopped
    command: celery -A backend beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - HF_HOME=/app/model_cache
      - SENTENCE_TRANSFORMERS_HOME=/app/model_cache
    volumes:
      - ./backend:/app
      - model_data:/app/model_cache
    depends_on:
      - redis
      - db

  frontend:
    build: ./frontend
    container_name: react_frontend
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    environment:
      - VITE_PORT=5173
      - WATCHPACK_POLLING=true

  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    image: pulsenet_db:latest
    container_name: postgres_db
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: pulsenet
      POSTGRES_USER: ${db_user}
      POSTGRES_PASSWORD: ${db_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${db_email}
      PGADMIN_DEFAULT_PASSWORD: ${db_password}
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    image: redis:7
    container_name: redis_server
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  model_data: